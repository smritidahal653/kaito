apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2 # Amazon Linux 2
  role: "KarpenterNodeRole-smriti-karpenter-new" # replace with your cluster name
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "smriti-karpenter-new" # replace with your cluster name
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "smriti-karpenter-new" # replace with your cluster name
  amiSelectorTerms:
    - id: ami-0c337c0fdef02e03d
    - id: ami-092a6920570e49a06
    - id: ami-0ee857dd4b82a4c36
#   - name: "amazon-eks-node-${K8S_VERSION}-*" # <- automatically upgrade when a new AL2 EKS Optimized AMI is released. This is unsafe for production workloads. Validate AMIs in lower environments before deploying them to production.
